name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to build binaries for"
        required: true

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  ensure-release:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - id: tag
        run: echo "tag=${{ github.event.inputs.tag || github.ref_name }}" >> "$GITHUB_OUTPUT"
      - env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${{ steps.tag.outputs.tag }}"
          gh release view "$tag" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1 ||
            gh release create "$tag" --repo "$GITHUB_REPOSITORY" \
              --title "densezip $tag" --generate-notes

  build:
    needs: ensure-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - { target: x86_64-unknown-linux-gnu, os: ubuntu-latest }
          - { target: aarch64-unknown-linux-gnu, os: ubuntu-24.04-arm }
          - { target: x86_64-apple-darwin, os: macos-latest }
          - { target: aarch64-apple-darwin, os: macos-latest }
          - { target: x86_64-pc-windows-msvc, os: windows-latest }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.ensure-release.outputs.tag }}
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - run: cargo build --release --target ${{ matrix.target }}
      - name: Package
        shell: bash
        run: |
          name="dnz-${{ matrix.target }}"
          mkdir dist
          if [[ "${{ matrix.target }}" == *windows* ]]; then
            cp "target/${{ matrix.target }}/release/dnz.exe" .
            7z a "dist/$name.zip" dnz.exe LICENSE README.md >/dev/null
            (cd dist && sha256sum "$name.zip" > "$name.zip.sha256")
          else
            cp "target/${{ matrix.target }}/release/dnz" .
            tar czf "dist/$name.tar.gz" dnz LICENSE README.md
            (cd dist && { sha256sum "$name.tar.gz" 2>/dev/null || shasum -a 256 "$name.tar.gz"; } > "$name.tar.gz.sha256")
          fi
      - name: Upload assets
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ needs.ensure-release.outputs.tag }}" dist/* --clobber --repo "$GITHUB_REPOSITORY"
